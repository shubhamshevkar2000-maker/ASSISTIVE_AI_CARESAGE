version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: acuvera_db
      POSTGRES_USER: acuvera
      POSTGRES_PASSWORD: acuvera_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acuvera -d acuvera_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://acuvera:acuvera_pass@db:5432/acuvera_db
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-changeme-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      BYPASS_AUTH: ${BYPASS_AUTH:-false}
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434/api/chat}
      LLM_ENABLED_DEFAULT: ${LLM_ENABLED_DEFAULT:-true}
      LLM_MODEL: ${LLM_MODEL:-llama3}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      SENTRY_DSN: ${SENTRY_DSN:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      FHIR_BASIC_USERNAME: ${FHIR_BASIC_USERNAME:-fhir}
      FHIR_BASIC_PASSWORD: ${FHIR_BASIC_PASSWORD:-fhir_pass}
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_data &&
             gunicorn acuvera.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 4 --timeout 60"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
